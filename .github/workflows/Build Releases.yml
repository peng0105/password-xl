name: 发布版本

on:
  push:
    branches:
      - master
    paths-ignore:
      - '**/package.json'

permissions:
  contents: write

jobs:
  build-project:
    runs-on: ubuntu-latest
    container:
      image: catthehacker/ubuntu:act-latest
      volumes:
        - ubuntu_dockercache:/opt/dockercache
    outputs:
      REPO_VERSION: ${{ steps.set_output.outputs.REPO_VERSION }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 nvm
        uses: dcodeIO/setup-node-nvm@v5
        with:
          node-version: 22.18.x

      - name: 缓存 yarn 模块
        uses: actions/cache@v3
        with:
          path: |
            ~/.yarn/cache
            ~/.yarn/unplugged
            ~/.cache/yarn
          key: ${{ runner.os }}-yarn-${{ hashFiles('password-xl-web/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: 安装 yarn
        run: |
          corepack enable
          corepack prepare yarn@4.16.0 --activate
          yarn --version

      - name: 安装依赖
        run: yarn install
        working-directory: ./password-xl-web

      - name: 安装 Jdk25
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: 版本输出
        run: |
          echo "GRAALVM_HOME: $GRAALVM_HOME"
          echo "JAVA_HOME: $JAVA_HOME"
          java --version
          native-image --version

      - name: 获取gradle缓存
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: 设置gradlew可执行权限
        run: chmod +x ./password-xl-service/gradlew

      - name: 获取本次发布的版本信息web
        working-directory: ./password-xl-web
        run: echo REPO_VERSION=$(node -p "require('./package.json').version") >> $GITHUB_ENV

      - name: 获取本次发布的版本信息service
        working-directory: ./password-xl-service
        run: echo REPO_SERVER_VERSION=$(./gradlew -q printVersion) >> $GITHUB_ENV

      - name: 编译前端项目
        run: yarn run build
        working-directory: ./password-xl-web

      - name: 编译后端项目
        working-directory: ./password-xl-service
        run: ./gradlew bootJar

      - name: 压缩前端编译结果
        run: |
          zip -r password-xl-web/dist.zip password-xl-web/dist
          tar -zcvf password-xl-web/dist.tar.gz password-xl-web/dist

      - name: 准备发布文件
        run: |
          cp password-xl-web/dist.zip password-xl-web-dist-${REPO_VERSION}.zip
          cp password-xl-web/dist.tar.gz password-xl-web-dist-${REPO_VERSION}.tar.gz
          cp password-xl-service/build/libs/password-xl-service-${REPO_SERVER_VERSION}.jar password-xl-service-${REPO_VERSION}.jar

      - name: 创建或更新发布版本
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.REPO_VERSION }}
          name: Release ${{ env.REPO_VERSION }}
          draft: false
          prerelease: false
          overwrite_files: true
          files: |
            password-xl-web-dist-${{ env.REPO_VERSION }}.zip
            password-xl-web-dist-${{ env.REPO_VERSION }}.tar.gz
            password-xl-service-${{ env.REPO_VERSION }}.jar

      - name: 更新 package.json 版本
        run: |
          NEW_VERSION=$(node -p "require('./package.json').version.split('.').map((v, i) => i === 2 ? parseInt(v) + 1 : v).join('.')") # 更新为新的版本号
          jq --arg version "$NEW_VERSION" '.version = $version' ./package.json > ./package.tmp.json && mv ./package.tmp.json ./package.json
        working-directory: ./password-xl-web

      - name: 提交版本更新
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add ./password-xl-web/package.json
          git commit -m "发布前版本号更新"
          git push

      - name: 设置发布版本输出
        id: set_output
        run: |
          echo "REPO_VERSION=${{ env.REPO_VERSION }}" >> "$GITHUB_OUTPUT"

  build-windows:
    runs-on: windows-latest
    needs: build-project
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 nvm
        uses: dcodeIO/setup-node-nvm@v5
        with:
          node-version: 22.18.x

      - name: 缓存 yarn 模块
        uses: actions/cache@v3
        with:
          path: |
            ~/.yarn/cache
            ~/.yarn/unplugged
            ~/.cache/yarn
          key: ${{ runner.os }}-yarn-${{ hashFiles('password-xl-web/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: 安装 yarn
        run: |
          corepack enable
          corepack prepare yarn@4.16.0 --activate
          yarn --version

      - name: 安装依赖
        run: yarn install
        working-directory: ./password-xl-web

      - name: 编译Windows应用
        working-directory: ./password-xl-web
        run: yarn run dist-to-windows

      - name: 准备Windows发布文件
        run: Copy-Item -LiteralPath "password-xl-web/build/password-XL-Windows-${{ needs.build-project.outputs.REPO_VERSION }}.exe" -Destination "password-xl-win-${{ needs.build-project.outputs.REPO_VERSION }}.exe"

      - name: 上传Windows应用
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.build-project.outputs.REPO_VERSION }}
          overwrite_files: true
          files: password-xl-win-${{ needs.build-project.outputs.REPO_VERSION }}.exe

  build-macos:
    runs-on: macos-latest
    needs: build-project

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 nvm
        uses: dcodeIO/setup-node-nvm@v5
        with:
          node-version: 22.18.x

      - name: 缓存 yarn 模块
        uses: actions/cache@v3
        with:
          path: |
            ~/.yarn/cache
            ~/.yarn/unplugged
            ~/.cache/yarn
          key: ${{ runner.os }}-yarn-${{ hashFiles('password-xl-web/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: 安装 yarn
        run: |
          corepack enable
          corepack prepare yarn@4.16.0 --activate
          yarn --version

      - name: 安装依赖
        run: yarn install
        working-directory: ./password-xl-web

      - name: 编译mac应用程序
        working-directory: ./password-xl-web
        run: yarn run dist-to-mac

      - name: 显示编译后的文件
        run: ls -la password-xl-web/build/

      - name: 准备mac发布文件
        run: cp password-xl-web/build/password-XL-Mac-${{ needs.build-project.outputs.REPO_VERSION }}.dmg password-xl-mac-${{ needs.build-project.outputs.REPO_VERSION }}.dmg

      - name: 上传mac应用程序
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.build-project.outputs.REPO_VERSION }}
          overwrite_files: true
          files: password-xl-mac-${{ needs.build-project.outputs.REPO_VERSION }}.dmg

  build-linux:
    runs-on: ubuntu-latest
    needs: build-project
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 nvm
        uses: dcodeIO/setup-node-nvm@v5
        with:
          node-version: 22.18.x

      - name: 缓存 yarn 模块
        uses: actions/cache@v3
        with:
          path: |
            ~/.yarn/cache
            ~/.yarn/unplugged
            ~/.cache/yarn
          key: ${{ runner.os }}-yarn-${{ hashFiles('password-xl-web/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: 安装 yarn
        run: |
          corepack enable
          corepack prepare yarn@4.16.0 --activate
          yarn --version

      - name: 安装依赖
        run: yarn install
        working-directory: ./password-xl-web

      - name: 编译Linux应用程序
        working-directory: ./password-xl-web
        run: yarn run dist-to-linux

      - name: 显示编译后的文件
        run: ls -la password-xl-web/build/

      - name: 准备Linux发布文件
        run: |
          cp password-xl-web/build/password-XL-Linux-${{ needs.build-project.outputs.REPO_VERSION }}.AppImage password-xl-linux-${{ needs.build-project.outputs.REPO_VERSION }}.AppImage
          cp password-xl-web/build/password-XL-Linux-${{ needs.build-project.outputs.REPO_VERSION }}.rpm password-xl-linux-${{ needs.build-project.outputs.REPO_VERSION }}.rpm
          cp password-xl-web/build/password-XL-Linux-${{ needs.build-project.outputs.REPO_VERSION }}.snap password-xl-linux-${{ needs.build-project.outputs.REPO_VERSION }}.snap

      - name: 上传Linux应用程序
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.build-project.outputs.REPO_VERSION }}
          overwrite_files: true
          files: |
            password-xl-linux-${{ needs.build-project.outputs.REPO_VERSION }}.AppImage
            password-xl-linux-${{ needs.build-project.outputs.REPO_VERSION }}.rpm
            password-xl-linux-${{ needs.build-project.outputs.REPO_VERSION }}.snap
