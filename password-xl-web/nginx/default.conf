server {
    listen       80;
    server_name  localhost;

    location / {
        root   /html;
        index  index.html index.htm;
		try_files  $uri $uri/ /index.html;
    }

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
